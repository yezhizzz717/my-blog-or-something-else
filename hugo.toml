baseURL = "https://yourdomain.com"
title = "Yao的博客"
theme = "PaperMod"
defaultContentLanguage = "zh"
hasCJKLanguage = true
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  author = "叶芝"
  description = "写些东西，说点东西，maybe。"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = true
  comments = true

  [params.homeInfoParams]
    Title = "Hi，欢迎来到我的博客"
    Content = "这里记录我的想法、技术笔记和生活点滴。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yezhizzz717"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:yaowujunya@gmail.com"

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "分类"
    url = "/categories/"
    weight = 2
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 4
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 5

[minify]
  disableXML = true
  minifyOutput = true
